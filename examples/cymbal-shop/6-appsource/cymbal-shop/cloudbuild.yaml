steps:
  - name: gcr.io/cloud-builders/gcloud
    id: download-skaffold-cache
    args: ['storage', 'cp', $_CACHE_URI, '/workspace/cache']
  - name: gcr.io/k8s-skaffold/skaffold:v2.21.0
    entrypoint: 'bash'
    args:
    - '-c'
    - |
        docker image prune -f --all && docker buildx prune -f
        docker pull python:3.14.2-alpine@sha256:31da4cb527055e4e3d7e9e006dffe9329f84ebea79eaca0a1f1c27ce61e40ca5
        docker pull python:3.14.2-slim@sha256:1a3c6dbfd2173971abba880c3cc2ec4643690901f6ad6742d0827bae6cefc925
        docker pull golang:1.25.6-alpine@sha256:98e6cffc31ccc44c7c15d83df1d69891efee8115a5bb7ede2bf30a38af3e3c92
        docker pull eclipse-temurin:24.0.2_12-jdk-noble@sha256:dacac8e9a0df0d2bd24e702b4431132875c249930b70555ebd7ca285b5bee684
        docker pull mcr.microsoft.com/dotnet/sdk:10.0.100-noble@sha256:c7445f141c04f1a6b454181bd098dcfa606c61ba0bd213d0a702489e5bd4cd71
        docker pull mcr.microsoft.com/dotnet/runtime-deps:10.0.0-noble-chiseled@sha256:b857c8cb8d929183cfe4c6dd9994abba92a2639dd2dbaf06005379f815991604
        docker pull node:20.20.0-alpine@sha256:09e2b3d9726018aecf269bd35325f46bf75046a643a66d28360ec71132750ec8
        skaffold build \
        --file-output=/workspace/artifacts.json \
        --default-repo=$_CONTAINER_REGISTRY  \
        --file-output=/workspace/artifacts.json \
        --cache-file=/workspace/$_CACHE \
  - name: gcr.io/cloud-builders/gcloud
    id: upload-skaffold-cache
    args: ['storage', 'cp', '/workspace/$_CACHE',  $_CACHE_URI]

  - name: 'bash'
    id: 'get-image-urls'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache jq
        jq -r '.builds[] | select(.imageName=="emailservice") | .tag' /workspace/artifacts.json > /workspace/emailservice.txt
        jq -r '.builds[] | select(.imageName=="productcatalogservice") | .tag' /workspace/artifacts.json > /workspace/productcatalogservice.txt
        jq -r '.builds[] | select(.imageName=="recommendationservice") | .tag' /workspace/artifacts.json > /workspace/recommendationservice.txt
        jq -r '.builds[] | select(.imageName=="shoppingassistantservice") | .tag' /workspace/artifacts.json > /workspace/shoppingassistantservice.txt
        jq -r '.builds[] | select(.imageName=="shippingservice") | .tag' /workspace/artifacts.json > /workspace/shippingservice.txt
        jq -r '.builds[] | select(.imageName=="checkoutservice") | .tag' /workspace/artifacts.json > /workspace/checkoutservice.txt
        jq -r '.builds[] | select(.imageName=="paymentservice") | .tag' /workspace/artifacts.json > /workspace/paymentservice.txt
        jq -r '.builds[] | select(.imageName=="currencyservice") | .tag' /workspace/artifacts.json > /workspace/currencyservice.txt
        jq -r '.builds[] | select(.imageName=="cartservice") | .tag' /workspace/artifacts.json > /workspace/cartservice.txt
        jq -r '.builds[] | select(.imageName=="frontend") | .tag' /workspace/artifacts.json > /workspace/frontend.txt
        jq -r '.builds[] | select(.imageName=="adservice") | .tag' /workspace/artifacts.json > /workspace/adservice.txt
        jq -r '.builds[] | select(.imageName=="loadgenerator") | .tag' /workspace/artifacts.json > /workspace/loadgenerator.txt
        echo "emailservice Image: $(cat /workspace/emailservice.txt)"
        echo "productcatalogservice Image:  $(cat /workspace/productcatalogservice.txt)"
        echo "recommendationservice Image:  $(cat /workspace/recommendationservice.txt)"
        echo "shoppingassistantservice Image:  $(cat /workspace/shoppingassistantservice.txt)"
        echo "shippingservice Image:  $(cat /workspace/shippingservice.txt)"
        echo "checkoutservice Image:  $(cat /workspace/checkoutservice.txt)"
        echo "paymentservice Image:  $(cat /workspace/paymentservice.txt)"
        echo "currencyservice Image:  $(cat /workspace/currencyservice.txt)"
        echo "cartservice Image:  $(cat /workspace/cartservice.txt)"
        echo "frontend Image:  $(cat /workspace/frontend.txt)"
        echo "adservice Image:  $(cat /workspace/adservice.txt)"
        echo "loadgenerator Image:  $(cat /workspace/loadgenerator.txt)"

  - id: 'create-attestation-emailservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/emailservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-productcatalogservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/productcatalogservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-recommendationservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/recommendationservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-shoppingassistantservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/shoppingassistantservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-shippingservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/shippingservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-checkoutservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/checkoutservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-paymentservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/paymentservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-currencyservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/currencyservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-cartservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/cartservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-frontend'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/frontend.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-adservice'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/adservice.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - id: 'create-attestation-loadgenerator'
    name: '$_BINARY_AUTH_IMAGE'
    args:
      - '--artifact-url'
      - "$$(cat /workspace/loadgenerator.txt)"
      - '--attestor'
      - '$_ATTESTOR_ID'
      - '--keyversion'
      - '$_KMS_KEY_VERSION'
  - name: gcr.io/cloud-builders/gcloud
    args:
      - "deploy"
      - "releases"
      - "create"
      - "cymbalshop-$SHORT_SHA"
      - "--delivery-pipeline=$_CLOUDDEPLOY_PIPELINE_NAME"
      - "--build-artifacts=/workspace/artifacts.json"
      - "--gcs-source-staging-dir=$_SOURCE_STAGING_BUCKET/$SHORT_SHA"
      - "--skaffold-file=skaffold.yaml"
      - "--region=$LOCATION"
options:
  logging: CLOUD_LOGGING_ONLY
  env:
    - 'DOCKER_CLI_EXPERIMENTAL=enabled'
    - 'DOCKER_API_VERSION=1.41'
  pool:
    name: '${_PRIVATE_POOL}'
